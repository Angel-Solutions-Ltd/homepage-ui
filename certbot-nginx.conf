server {
    listen 443 ssl;

    server_name localhost;

    ssl_certificate /etc/letsencrypt/live/angelsolutions.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/angelsolutions.net/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # No cache for HTML (SPA entry point)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets long-term
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
