<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lovelo Line Light H1</title>
  <style>
    @font-face {
      font-family: 'LoveloLineLight';
      src: url('lovelo_linelight.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

	@font-face {
      font-family: 'LoveloBlack';
      src: url('lovelo_black.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    .body {
      margin: 0;
      background-color: #004aad;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 900px;
	  width: 900px;
    }

    h1 {
      font-family: 'LoveloBlack', sans-serif;
      font-size: 600px;
	  font-weight: 100;
	  letter-spacing: 5px;
    }
	
	h1 span.first-letter {
      font-family: 'LoveloBlack', sans-serif;
    }
  </style>
</head>
<body>
	<div class="body"><h1><span class="first-letter">A</span></h1></div>
</body>
</html>
